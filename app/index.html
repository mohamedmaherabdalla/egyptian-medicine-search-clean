<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medicine lookup</title>
  <link rel="stylesheet" href="styles.css?v=20260711.2">
</head>
<body>
  <main>
    <div class="topline">
      <div>
        <div class="brand">Medicine lookup</div>
      </div>
      <div id="status" class="status">Loading catalog...</div>
    </div>

    <form class="search-shell" id="searchForm">
      <div class="search-panel">
        <input id="query" type="search" autocomplete="off" dir="auto" placeholder="Brand, ingredient, Arabic name, strength...">
        <button id="searchBtn" type="submit">Search</button>
      </div>
      <label class="continuation-control" for="unreadableContinuation">
        <input id="unreadableContinuation" type="checkbox">
        <span>More unreadable letters follow</span>
      </label>
    </form>

    <div id="error" class="error"></div>
    <div id="summary" class="summary"></div>

    <section id="results" class="results"></section>
  </main>

  <script src="app.js?v=20260711.2"></script>
</body>
</html>
